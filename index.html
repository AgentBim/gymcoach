<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Chalk Up</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0C1118" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chalk Up" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />
    <meta name="description" content="Gymnastics workout planning for coaches" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0C1118;
        --s1: #131B26;
        --s2: #192133;
        --br: #242E42;
        --br2: #2E3D56;
        --tx: #D8E3F2;
        --mu: #6B7A96;
        --ac: #A8ED52;
        --ac2: #85D42E;
        --font: 'DM Sans', sans-serif;
        --mono: 'DM Mono', monospace;
        --r: 8px;
        --rl: 12px;
      }
      body {
        background: var(--bg);
        color: var(--tx);
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
      }
      input, button, select, textarea { font-family: var(--font); }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--s1); }
      ::-webkit-scrollbar-thumb { background: var(--br2); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
